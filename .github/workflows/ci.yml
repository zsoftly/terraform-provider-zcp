name: CI

on:
  push:
    branches: [main, 'issue/*', 'issues/*', 'feature/*', 'feat/*', 'fix/*', 'release/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: 1. Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'main.go'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
              - 'GNUmakefile'

  test:
    name: 2. Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -s -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            echo "Run: gofmt -s -w ."
            exit 1
          fi

      - name: Run tests
        run: go test -v -count=1 ./...

      - name: Run tests (race detector)
        run: go test -race -count=1 ./...

      - name: Build provider
        run: go build -o terraform-provider-zcp ./

  security:
    name: 3. Security Analysis
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - run: go mod download

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
